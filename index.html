<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeni Store | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="Zenitron Store Logo" class="main-logo">
        <p class="slogan">Berkah Ramadhan, Langganan Premium Lebih Hemat!</p>
    </header>

    <div class="main-layout">
        <section class="form-section">
            <h3>Input Pesanan Baru</h3>
            <form id="orderForm">
                <input type="text" id="buyerName" placeholder="Nama Pembeli" required>
                
                <select id="appType" required>
                    <option value="">Pilih Aplikasi...</option>
                    <option value="Canva Pro">Canva Pro</option>
                    <option value="Viu Premium">Viu Premium</option>
                    <option value="YouTube Premium">YouTube Premium</option>
                    <option value="Netflix Premium">Netflix Premium</option>
                    <option value="Spotify Premium">Spotify Premium</option>
                    <option value="Vidio Platinum">Vidio Platinum</option>
                    <option value="WeTV Premium">WeTV Premium</option>
                    <option value="Drakor ID">Drakor ID</option>
                    <option value="ChatGPT Plus">ChatGPT Plus</option>
                    <option value="Gemini AI + GDrive">Gemini AI + GDrive</option>
                    <option value="CapCut Pro">CapCut Pro</option>
                    <option value="Duolingo Super">Duolingo Super</option>
                    <option value="Get Contact">Get Contact</option>
                </select>

                <select id="appVariant" required>
                    <option value="">Pilih Variasi...</option>
                </select>

                <input type="text" id="displayPrice" placeholder="Harga Otomatis" readonly>
                
                <button type="submit">Simpan & Pesan via WA</button>
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
